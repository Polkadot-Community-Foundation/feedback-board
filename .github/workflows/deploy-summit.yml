name: Deploy to Summit (feedback.dot)

# Deploy the Feedback Board frontend to the Web3 Summit network, bound to
# `feedback.dot`, and (best-effort) list it in the playground Apps grid so it's
# moddable (`playground mod feedback.dot`).
#
# This is the FRONTEND leg. The CONTRACT leg (`@polkadot/feedback` via
# `cdm deploy -n w3s`) is a separate manual/VM step that must run FIRST so the
# board resolves on Summit — see DEPLOY_SUMMIT.md.
#
# Deploy vehicle = `playground deploy` (playground-cli) — the only tool that does
# host + bind + registry-publish + moddable, and runs headless when
# --signer/--domain/--buildDir/--playground/--contracts are all specified. It is a
# PRIVATE PCF package whose Summit wiring (@w3s CDM meta-registry via
# @polkadot-community-foundation/cdm-env) isn't in the public paritytech binaries,
# so CI builds the PCF fork from source at a pinned SHA.
#
# ⚠️ The deploy is SPLIT for resilience: the name bind MUST pass, but the
# `--playground` Apps-grid publish is a SEPARATE best-effort step — on Summit the
# registry's `publish` is authorization-gated and reverts `Unauthorized` for the
# deploy signer (CLI hdkd-signer ≠ registry sudo). If it stays red, a playground
# admin pins the app instead (curation model — see DEPLOY_SUMMIT.md).

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Attempt the playground-registry publish (moddable). Off = host + bind name only."
        type: boolean
        default: true
  push:
    branches: [main]
    # Day-2 redeploys only when app content changes; run the greenfield first
    # deploy via workflow_dispatch so it can be watched.
    paths:
      - "src/**"
      - "index.html"
      - "cdm.json"
      - "package.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - ".github/workflows/deploy-summit.yml"

concurrency:
  # One signer (5Fk8) signs serially on-chain — never run two deploys at once.
  group: deploy-summit-feedback
  cancel-in-progress: false

permissions:
  contents: read

env:
  # playground-cli (PCF fork) carries `--env summit` + resolves the @w3s CDM
  # meta-registry (0xa5747e60…0141) via @polkadot-community-foundation/cdm-env.
  # Pinned to the env-aware-publish fix (PCF playground-cli #2, now fork main):
  # earlier commits routed the --playground publish to Paseo, not Summit. Bump REF
  # as the fork advances; the hard requirement is cdm-env >= 2.1.0 (w3s populated).
  PLAYGROUND_CLI_REPO: Polkadot-Community-Foundation/playground-cli
  PLAYGROUND_CLI_REF: 9bc441548c6915fe612d031b83684797f3e6c2a0
  # Registry card filter tag (social|chat|defi|utility|gaming|marketplace|irl).
  # A shared feedback board = social.
  PLAYGROUND_TAG: social

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout feedback-board
        uses: actions/checkout@v4
        # `--moddable` records `git remote get-url origin` as the public source repo.

      - name: Guard — deployer mnemonic must be set
        env:
          MNEMONIC: ${{ secrets.SUMMIT_DEPLOYER_KEY }}
        run: |
          if [ -z "$MNEMONIC" ]; then
            echo "::error::secrets.SUMMIT_DEPLOYER_KEY is not set. Add the 5Fk8 deployer mnemonic (see DEPLOY_SUMMIT.md)."
            exit 1
          fi

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm (to build playground-cli)
        uses: pnpm/action-setup@v4
        with:
          version: "11.5.2"

      - name: Setup Bun (playground-cli compile + runtime)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── App leg: build the SPA (npm — the repo gitignores the lockfile) ──────
      - name: Install app deps
        run: npm install --no-audit --no-fund

      - name: Build SPA
        run: npm run build:frontend # tsc -b && vite build -> ./dist (relative base, IPFS-ready)

      - name: Assert the bundle is Summit-only (no Paseo strings baked in)
        run: |
          if grep -rIil 'paseo' dist; then
            echo "::error::Paseo reference found in built bundle — aborting Summit deploy"
            exit 1
          fi
          echo "OK: no Paseo strings in dist"

      # ── Tooling leg: build the Summit-capable playground CLI from the fork ───
      - name: Checkout playground-cli (PCF fork, pinned)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PLAYGROUND_CLI_REPO }}
          ref: ${{ env.PLAYGROUND_CLI_REF }}
          path: .playground-cli

      - name: Build playground CLI binary
        working-directory: .playground-cli
        run: |
          # --no-frozen-lockfile: the pinned fork commit's pnpm-lock can lag its
          # package.json (cdm-env repointed without relocking). We only need the
          # binary; cdm-env@2.1.0 is public on npm.
          pnpm install --no-frozen-lockfile
          bun build --compile src/index.ts --outfile "$RUNNER_TEMP/playground"
          "$RUNNER_TEMP/playground" --version

      - name: Sanity — Summit CDM registry resolves (w3s populated)
        working-directory: .playground-cli
        run: |
          node --input-type=module -e "import {getRegistryAddress} from '@polkadot-community-foundation/cdm-env'; const a=getRegistryAddress('w3s'); if(!a){console.error('::error::cdm-env w3s registry address is empty — Summit publish would fail'); process.exit(1)} console.log('w3s CDM registry =', a)"

      # ── Deploy (storage + DotNS) — the live deploy; MUST pass ──
      # `--no-playground`: just upload to Bulletin + bind feedback.dot. The
      # Apps-grid publish is the SEPARATE best-effort step below.
      - name: Deploy feedback.dot (storage + name)
        env:
          MNEMONIC: ${{ secrets.SUMMIT_DEPLOYER_KEY }}
        run: |
          set -euo pipefail
          "$RUNNER_TEMP/playground" deploy \
            --env summit \
            --signer dev --suri "$MNEMONIC" \
            --domain feedback \
            --buildDir dist --no-build \
            --no-contracts \
            --no-playground

      # ── Best-effort: list feedback.dot in the playground Apps grid (+ moddable
      #    source link). `publish` is authorization-gated on Summit and may revert
      #    `Unauthorized`; `continue-on-error` so it never blocks the live deploy.
      #    If it stays blocked, a playground admin pins the app (see DEPLOY_SUMMIT.md
      #    "Apps-grid listing"). Storage is idempotent → re-upload resolves same CID.
      - name: Publish to playground Apps grid (best-effort)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
        continue-on-error: true
        env:
          MNEMONIC: ${{ secrets.SUMMIT_DEPLOYER_KEY }}
        run: |
          set -euo pipefail
          "$RUNNER_TEMP/playground" deploy \
            --env summit \
            --signer dev --suri "$MNEMONIC" \
            --domain feedback \
            --buildDir dist --no-build \
            --no-contracts \
            --playground --moddable --tag "$PLAYGROUND_TAG"

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "### Feedback Board → Summit"
            echo
            echo "Live &nbsp; https://feedback.dot.li  (\`feedback.dot\`)"
            echo
            echo "Apps-grid publish is best-effort (authorization-gated on Summit). If that"
            echo "step is red, the app is still live — a playground admin pins it to the grid."
            echo "See DEPLOY_SUMMIT.md \"Apps-grid listing\"."
          } >> "$GITHUB_STEP_SUMMARY"
