name: Deploy to Summit (feedback.dot)

# Publishes Feedback Board as the canonical `feedback.dot` app on the Web3 Summit
# network. One run does three legs:
#   1. build the Vite SPA            (npm run build:frontend -> dist/)
#   2. upload to Summit Bulletin + bind the DotNS name feedback.dot
#   3. publish it (moddable) into the @polkadot/playground-registry (legacy alias
#      @w3s/playground-registry, 0x14C27954…) so it shows in the playground Apps
#      grid and attendees can `playground mod feedback.dot`.
#
# Deploy vehicle = the PCF `playground-cli` fork (NOT polkadot-app-deploy): it is
# the only tool that writes the Apps-grid registry entry AND marks the app
# moddable. It is a PRIVATE package distributed as paritytech release binaries
# that DON'T carry the Summit @w3s cdm-env, so CI builds the fork from source at a
# pinned SHA. The `playground deploy` command runs headless when
# --signer/--domain/--buildDir/--playground/--contracts are all specified.
#
# Contracts are NOT deployed here (--no-contracts): `@polkadot/feedback` is
# deployed once, manually, via `cdm deploy -n w3s` (see DEPLOY_SUMMIT.md). The SPA
# live-resolves its address from the CDM registry at boot.
#
# Signer: secrets.SUMMIT_DEPLOYER_KEY = the canonical PCF deployer 5Fk8 — Bulletin-
# authorized, owner of feedback.dot, and the playground-registry sudo (may publish).

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to the playground registry (moddable). Off = host + bind name only."
        type: boolean
        default: true
  push:
    branches: [main]
    # Day-2 redeploys: only when app content actually changes. Run the first
    # (greenfield) publish via workflow_dispatch so it can be watched.
    paths:
      - "src/**"
      - "index.html"
      - "cdm.json"
      - "package.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - ".github/workflows/deploy-summit.yml"

concurrency:
  # One signer (5Fk8) signs serially on-chain — never run two deploys at once.
  group: deploy-summit-feedback
  cancel-in-progress: false

permissions:
  contents: read

env:
  # DotNS label bound on Summit. 8 chars (<9) => PoP-Full-gated; already registered
  # to 5Fk8 via the registerReserved owner-override, so the deploy sees it owned.
  DOMAIN: feedback
  # Registry card filter tag (one of playground-cli's PLAYGROUND_TAGS:
  # social|chat|defi|utility|gaming|marketplace|irl). A shared feedback board = social.
  PLAYGROUND_TAG: social
  # playground-cli carries the `--env summit` wiring AND resolves the @w3s CDM
  # meta-registry (0xa5747e60…0141) via @polkadot-community-foundation/cdm-env.
  # Pinned to the env-aware-publish fix (PCF playground-cli #2): earlier commits
  # published the --playground registry entry to Paseo instead of Summit, so the
  # app never appeared in the Summit Apps grid. Bump REF as the fork advances;
  # the hard requirement is its cdm-env stays >= 2.1.0 (w3s address populated).
  PLAYGROUND_CLI_REPO: Polkadot-Community-Foundation/playground-cli
  PLAYGROUND_CLI_REF: 9bc441548c6915fe612d031b83684797f3e6c2a0

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout feedback-board
        uses: actions/checkout@v4
        # `--moddable` records `git remote get-url origin` as the public source
        # repo — actions/checkout sets origin to this repo's https URL.

      - name: Guard — deployer mnemonic must be set
        env:
          MNEMONIC: ${{ secrets.SUMMIT_DEPLOYER_KEY }}
        run: |
          if [ -z "$MNEMONIC" ]; then
            echo "::error::secrets.SUMMIT_DEPLOYER_KEY is not set. Add the 5Fk8 deployer mnemonic (see DEPLOY_SUMMIT.md)."
            exit 1
          fi

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm (for building playground-cli)
        uses: pnpm/action-setup@v4
        with:
          version: "11.5.2"

      - name: Setup Bun (playground-cli compile + runtime)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── App leg: build the SPA (no committed lockfile → npm install) ─────────
      - name: Install app deps
        run: npm install --no-audit --no-fund

      - name: Build SPA
        run: npm run build:frontend # tsc -b && vite build -> ./dist (relative base, IPFS-ready)

      - name: Assert the bundle is Summit-only (no Paseo strings baked in)
        run: |
          if grep -rIil 'paseo' dist; then
            echo "::error::Paseo reference found in built bundle — aborting Summit deploy"
            exit 1
          fi
          echo "OK: no Paseo strings in dist"

      # ── Tooling leg: build the Summit-capable playground CLI from the fork ───
      - name: Checkout playground-cli (PCF fork, pinned)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PLAYGROUND_CLI_REPO }}
          ref: ${{ env.PLAYGROUND_CLI_REF }}
          path: .playground-cli

      - name: Build playground CLI binary
        working-directory: .playground-cli
        run: |
          # --no-frozen-lockfile: the pinned fork commit ships a stale pnpm-lock
          # (package.json repointed to @polkadot-community-foundation/cdm-env@^2.1.0
          # without regenerating the lock). We only need the binary; cdm-env@2.1.0
          # is public on npm. Drop back to --frozen-lockfile once the fork relocks.
          pnpm install --no-frozen-lockfile
          bun build --compile src/index.ts --outfile "$RUNNER_TEMP/playground"
          "$RUNNER_TEMP/playground" --version

      - name: Sanity — Summit CDM registry resolves (w3s populated)
        working-directory: .playground-cli
        run: |
          node --input-type=module -e "import {getRegistryAddress} from '@polkadot-community-foundation/cdm-env'; const a=getRegistryAddress('w3s'); if(!a){console.error('::error::cdm-env w3s registry address is empty — Summit publish would fail'); process.exit(1)} console.log('w3s CDM registry =', a)"

      # ── Deploy: host + bind name + (optional) registry publish ──────────────
      - name: Deploy to Summit
        env:
          MNEMONIC: ${{ secrets.SUMMIT_DEPLOYER_KEY }}
          # workflow_dispatch lets an operator turn publish off; push always publishes.
          PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == false && 'no' || 'yes' }}
        run: |
          set -euo pipefail
          PUBLISH_FLAGS="--playground --moddable --tag $PLAYGROUND_TAG"
          if [ "$PUBLISH" = "no" ]; then
            # isFullySpecified still needs a boolean playground flag -> --no-playground.
            PUBLISH_FLAGS="--no-playground"
          fi
          "$RUNNER_TEMP/playground" deploy \
            --env summit \
            --signer dev --suri "$MNEMONIC" \
            --domain "$DOMAIN" \
            --buildDir dist --no-build \
            --no-contracts \
            $PUBLISH_FLAGS
