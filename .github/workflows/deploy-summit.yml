name: Deploy to Summit

# Production deploy of the Feedback Board frontend to Summit (Bulletin Chain + DotNS).
#
# Summit-only, production-only by design: on Summit every preview domain would be
# a fresh DotNS registration (~SUM gas + Bulletin storage that expires in ~14 days
# + a proof-of-personhood gate on short labels), so there are NO per-PR preview
# deploys. PR validation lives in ci.yml (typecheck + build). This job runs on
# push to main and on manual dispatch, and always targets the single production
# domain `feedback.dot`.
#
# Deploy CLI: @polkadot-community-foundation/polkadot-app-deploy@0.10.1 — it ships
# the built-in `summit` env (RPCs + DotNS addresses + summit-ipfs gateway) and the
# manifest direct-signer fix. Installed + run inline (NOT the @parity-scoped
# reusable workflow, which pins a @parity/polkadot-app-deploy version that is not
# published). Flags mirror the proven w3s-payment-processor / browse path:
# --mnemonic (direct signer, never --suri), --config, --js-merkle, no --publish
# (Summit has no Publisher).
#
# The contract leg (`@polkadot/feedback` via `cdm deploy -n w3s`) is a one-time,
# greenfield, manually-signed step on the operator VM — see DEPLOY_SUMMIT.md. CI
# only ships the SPA; the SPA live-resolves the contract address from the on-chain
# CDM registry at boot, so a frontend redeploy needs no new contract.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
      - 'cdm.json'
      - 'package.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'assets/**'
      - 'polkadot-app-deploy.config.ts'
      - '.github/workflows/deploy-summit.yml'
  workflow_dispatch:

concurrency:
  group: deploy-summit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build & deploy to Summit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build:frontend

      - name: Assert the bundle is Summit-only (no Paseo strings baked in)
        run: |
          if grep -rIil 'paseo' dist; then
            echo "::error::Paseo reference found in built bundle — aborting Summit deploy"
            exit 1
          fi
          echo "OK: no Paseo strings in dist"

      - name: Install deploy tool
        run: npm install -g @polkadot-community-foundation/polkadot-app-deploy@0.10.1

      - name: Deploy to Summit Bulletin + bind feedback.dot
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          # --mnemonic (direct signer; NEVER --suri — that rides the unauthorized
          # public pool and fails on Summit Bulletin). --config: the product
          # manifest (icon/name). --js-merkle: skip the Kubo download. No --publish:
          # Summit has no Publisher. feedback.dot must already be owned by the signer
          # (8-char label is PoP-gated → pre-registered via registerReserved; see
          # DEPLOY_SUMMIT.md). The tool then sees `already-owned-by-us`.
          command: >
            polkadot-app-deploy
            --env summit
            --mnemonic "$MNEMONIC"
            --config ./polkadot-app-deploy.config.ts
            --js-merkle
            --no-transfer-to-signedin-user
            ./dist feedback.dot
        env:
          # Summit Bulletin-authorized uploader / DotNS owner of feedback.dot (5Fk8,
          # the canonical W3S publisher). Set in repo secrets before the first deploy.
          MNEMONIC: ${{ secrets.SUMMIT_DEPLOYER_KEY }}
